<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENTLE AND NATURAL FORMULA - 444mg Capsules</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
        }

        /* 顶部蓝色横幅部分 */
        .hero-banner {
            background-color: #0056b3;
            color: white;
            text-align: center;
            padding: 40px 20px;
            text-transform: uppercase;
        }
        .hero-banner h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        /* 主体内容区域 - 两栏布局 */
        .content-container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            gap: 40px;
        }

        /* 左侧：营养成分表栏 */
        .facts-column {
            flex: 1;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .facts-column img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        /* 右侧：产品展示栏 */
        .product-column {
            flex: 1;
            position: relative;
            text-align: center;
            background-image: url('https://images.subspace.cc/b3e42297845ef6a95f84a1cb25a.jpg'); /* 直接使用科学水波纹图作为整栏背景 */
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 产品主图 */
        .product-image {
            max-width: 85%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15)); /* 给瓶子加一点立体阴影 */
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .content-container {
                flex-direction: column;
                padding: 15px;
            }
            .hero-banner h1 {
                font-size: 1.8em;
            }
            .product-column {
                min-height: auto;
            }
        }
    </style>
</head>
<body>

    <header class="hero-banner">
        <h1>GENTLE AND NATURAL FORMULA</h1>
    </header>

    <main class="content-container">
        
        <section class="facts-column">
            <img src="https://images.subspace.cc/f50406f96655080590822066dbe0ca1b_副本.jpg" alt="Supplement Facts and Chemical Info">
        </section>

        <section class="product-column">
            <img src="https://images.subspace.cc/72aa1a42c053bbd8bcbdb7eb43ed71a7.jpg" alt="444mg Curcumin Capsules" class="product-image">
        </section>

    </main>

</body>
</html>
