<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLVSTONE LABS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050b18;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(-45deg,#05101f,#0b2f6d,#0f5fe0,#05101f);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:72px;
letter-spacing:3px;
margin-bottom:15px;
}

.subtitle{
font-size:24px;
opacity:.9;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
border-radius:30px;
background:#1d7cff;
color:white;
text-decoration:none;
font-weight:bold;
}

.section{
padding:100px 20px;
text-align:center;
}

.card{
max-width:900px;
margin:auto;
padding:40px;
background:rgba(255,255,255,.05);
border-radius:20px;
backdrop-filter:blur(10px);
}

h2{
margin-bottom:20px;
}

p{
line-height:1.8;
}

footer{
padding:40px;
text-align:center;
opacity:.7;
}
</style>
</head>

<body>

<section class="hero">
<h1>SOLVSTONE LABS</h1>
<p class="subtitle">Science-Driven Wellness</p >
<a href=" " class="btn">Explore</a >
</section>

<section id="about" class="section">
<div class="card">
<h2>ABOUT US</h2>
<p>
SOLVSTONE LABS is dedicated to premium wellness products inspired by science, quality, and innovation.
Our mission is to deliver carefully crafted solutions that fit modern lifestyles.
</p >
</div>
</section>

<section class="section">
<div class="card">
<h2>CONTACT</h2>
<p>Email Coming Soon</p >
</div>
</section>

<footer>
© 2026 SOLVSTONE LABS
</footer>

</body>
</html>
